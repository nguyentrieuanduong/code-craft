# Lexical regression fixture: this detects routing drift; it does not
# measure real-world dispatch quality. Behavioral scenarios cover that.
version: 1
top_k: 3
skills:
  brainstorming:
    positive:
      - This is creative work for new features; shape notification behavior before implementation.
      - Help me decide the behavior of a payment-module refactor.
      - We need to shape a new project and compare design options.
    negative:
      - prompt: Diagnose this unexpected failing unit test.
        owner: systematic-debugging
      - prompt: The design is approved; write the implementation plan.
        owner: writing-plans
  code-review:
    positive:
      - Review this completed feature before it is merged.
      - Check this code diff for correctness and quality.
      - Evaluate this review feedback before I apply it.
    negative:
      - prompt: Prove the finished feature passes its verification commands.
        owner: verification-before-completion
      - prompt: Execute the approved implementation plan now.
        owner: executing-plans
  coding-standards:
    positive:
      - Write this production Python implementation cleanly.
      - Apply our coding standards during this implementation step.
      - While implementing this production code, keep it readable and maintainable.
    negative:
      - prompt: Find the root cause of this unexpected error.
        owner: systematic-debugging
      - prompt: The feature is complete and needs review before merge.
        owner: code-review
  dispatching-parallel-agents:
    positive:
      - The approved plan has independent tasks in unrelated files; run them in parallel.
      - Dispatch separate agents for these independent plan tasks.
      - Parallelize these tasks because they share no files or state.
    negative:
      - prompt: Implement the approved plan's steps one after another in this workspace.
        owner: executing-plans
      - prompt: Continue implementing the approved plan directly in this workspace.
        owner: executing-plans
  executing-plans:
    positive:
      - Implement this approved plan now.
      - Resume the interrupted implementation from its plan file.
      - The plan is approved and ready for execution.
    negative:
      - prompt: Design a new feature before any code is written.
        owner: brainstorming
      - prompt: The design is approved; create the detailed plan first.
        owner: writing-plans
  finishing-work:
    positive:
      - All tasks, verification, and review are complete; finish this branch.
      - Present the merge or pull-request options for this completed branch.
      - Conclude this branch now that the work is reviewed.
    negative:
      - prompt: Roll this change out to production safely.
        owner: releasing-safely
      - prompt: Review this completed task before we finish the branch.
        owner: code-review
  releasing-safely:
    positive:
      - Deploy this change to production with a safe rollout.
      - Roll out this feature flag to the shared environment.
      - Plan the production schema migration and rollback.
    negative:
      - prompt: The feature appears complete; run fresh checks before claiming it works.
        owner: verification-before-completion
      - prompt: Implement the approved local development plan.
        owner: executing-plans
  security-baseline:
    positive:
      - I am writing authentication code that accepts untrusted user input.
      - I am writing code that adds dependencies and needs a security check before commit.
      - Check this infrastructure configuration for security risks.
