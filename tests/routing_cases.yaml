      - prompt: Review the completed code against its specification.
        owner: code-review
  systematic-debugging:
    positive:
      - Diagnose this unexpected failing test before proposing a fix.
      - Find the root cause of this production error.
      - Investigate why this behavior changed unexpectedly.
