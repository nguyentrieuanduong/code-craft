      - prompt: Design a new feature before implementation.
        owner: brainstorming
      - prompt: Implement this approved plan with no reported failure.
        owner: executing-plans
  test-driven-development:
    positive:
      - Write production code for these features and bug fixes.
      - Fix this bug by writing a failing regression test first.
      - Refactor this production code using red-green-refactor.
