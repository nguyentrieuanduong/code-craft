name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  deterministic:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python3 -m pip install --requirement requirements-dev.txt
      - run: python3 -m tools.check
